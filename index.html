<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>やることリスト</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --text: #171717;
      --muted: #666;
      --line: #d9d9df;
      --accent: #111111;
      --accent-2: #f0f0f0;
      --success: #1f9d55;
      --danger: #c0392b;
      --shadow: 0 8px 24px rgba(0,0,0,.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--text);
      background: var(--bg);
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      max-width: 780px;
      margin: 0 auto;
      min-height: 100svh;
      padding: calc(env(safe-area-inset-top) + 14px) 14px calc(env(safe-area-inset-bottom) + 24px);
    }

    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .btn, .icon-btn, .seg-btn, .radio-chip {
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      border-radius: 14px;
      cursor: pointer;
      font-size: 15px;
    }

    .btn, .seg-btn { padding: 12px 14px; }
    .icon-btn {
      width: 48px;
      height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 12px;
    }

    .date-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-weight: 700;
      font-size: 24px;
    }

    .muted { color: var(--muted); font-size: 13px; }

    .progress-line {
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .progress-bar {
      height: 10px;
      background: var(--accent-2);
      border-radius: 999px;
      overflow: hidden;
      flex: 1;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width .2s ease;
    }

    .section-title {
      font-weight: 800;
      font-size: 18px;
      margin-bottom: 8px;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .task-item, .template-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: start;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fff;
    }

    .task-item.completed {
      opacity: .75;
      background: #fafafa;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      margin-top: 2px;
    }

    .task-title, .template-title { font-weight: 700; line-height: 1.4; }
    .task-meta, .template-meta { color: var(--muted); font-size: 13px; margin-top: 4px; }

    .action-col {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .mini-btn {
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: white;
      font-size: 13px;
      cursor: pointer;
    }

    .danger { color: var(--danger); }
    .primary { background: var(--accent); color: white; border-color: var(--accent); }

    .fab-wrap {
      position: sticky;
      bottom: calc(env(safe-area-inset-bottom) + 8px);
      display: flex;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .fab {
      border: none;
      background: var(--accent);
      color: white;
      padding: 16px 18px;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 700;
      box-shadow: var(--shadow);
      cursor: pointer;
    }

    .reward-banner {
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid #d7f0df;
      background: #f3fff7;
      color: #11663a;
      font-weight: 700;
      margin-bottom: 12px;
      display: none;
    }

    .empty {
      text-align: center;
      padding: 26px 10px;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 14px;
      background: #fcfcfc;
    }

    .seg-row, .radio-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .seg-btn.active, .radio-chip.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.38);
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 12px;
      z-index: 1000;
    }

    .modal-backdrop.show { display: flex; }

    .modal {
      width: min(760px, 100%);
      max-height: 92svh;
      overflow: auto;
      background: var(--card);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      position: sticky;
      top: 0;
      background: var(--card);
      padding-bottom: 8px;
    }

    .field { margin-bottom: 14px; }
    label { display: block; font-weight: 700; margin-bottom: 6px; }
    input[type="text"], input[type="date"], input[type="number"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      font-size: 16px;
      background: #fff;
    }

    .help { color: var(--muted); font-size: 12px; margin-top: 6px; }
    .error { color: var(--danger); font-size: 13px; margin-top: 8px; }

    .calendar-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .cal-label, .cal-day {
      text-align: center;
      padding: 10px 4px;
      border-radius: 12px;
      font-size: 14px;
    }

    .cal-label { color: var(--muted); font-weight: 700; }
    .cal-day {
      border: 1px solid var(--line);
      background: white;
      min-height: 54px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
    }

    .cal-day.is-today { outline: 2px solid var(--accent); }
    .cal-day.is-selected { background: var(--accent); color: white; border-color: var(--accent); }
    .cal-day.is-muted { opacity: .35; }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: currentColor;
      margin: 0 auto;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .stat-box {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fff;
    }

    .stat-value { font-size: 24px; font-weight: 800; }

    @media (max-width: 460px) {
      .date-card { font-size: 22px; }
      .task-item, .template-item { grid-template-columns: auto 1fr; }
      .action-col { grid-column: 2; flex-direction: row; flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <button class="icon-btn" id="openCalendarBtn" aria-label="カレンダー">📅</button>
      <button class="btn" id="openTemplatesBtn">やること作成</button>
      <button class="btn" id="openRewardBtn">設定 / 報酬</button>
    </div>

    <div class="card date-card">
      <div>
        <div id="selectedDateLabel">2026/04/19</div>
        <div class="muted">選択中の日付</div>
      </div>
      <div style="text-align:right; min-width:120px;">
        <div id="doneCountLabel" style="font-size:18px; font-weight:800;">0 / 0</div>
        <div class="muted">完了</div>
      </div>
    </div>

    <div class="card">
      <div class="progress-line">
        <span>進捗</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div class="reward-banner" id="rewardBanner">今日のやることを全達成しました。ゲーム時間30分を獲得しました。</div>

    <div class="card">
      <div class="section-title">選択日のやることリスト</div>
      <div id="taskList" class="list"></div>
    </div>

    <div class="fab-wrap">
      <button class="fab" id="openAddFromTemplateBtn">＋ 一覧から追加</button>
    </div>
  </div>

  <div class="modal-backdrop" id="calendarModal">
    <div class="modal">
      <div class="modal-header">
        <div class="section-title" style="margin:0;">カレンダー</div>
        <button class="mini-btn" data-close="calendarModal">閉じる</button>
      </div>
      <div class="calendar-head">
        <button class="mini-btn" id="prevMonthBtn">← 前月</button>
        <div id="calendarMonthLabel" style="font-weight:800;"></div>
        <button class="mini-btn" id="nextMonthBtn">翌月 →</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
  </div>

  <div class="modal-backdrop" id="templatesModal">
    <div class="modal">
      <div class="modal-header">
        <div class="section-title" style="margin:0;">やること作成</div>
        <button class="mini-btn" data-close="templatesModal">閉じる</button>
      </div>

      <div class="card" style="box-shadow:none; margin-bottom:16px;">
        <div class="field">
          <label>やること名</label>
          <input type="text" id="templateTitleInput" placeholder="例：物理 問題集" />
          <div class="help">一覧に保存して、必要な日に選んで追加します。</div>
        </div>

        <div class="field">
          <label>作成方法</label>
          <div class="radio-row">
            <button type="button" class="radio-chip active" id="splitOffBtn">章分けしない</button>
            <button type="button" class="radio-chip" id="splitOnBtn">章分けする</button>
          </div>
        </div>

        <div id="chapterFields" style="display:none;">
          <div class="field">
            <label>開始章</label>
            <input type="number" id="chapterStartInput" min="1" step="1" value="1" />
          </div>
          <div class="field">
            <label>終了章</label>
            <input type="number" id="chapterEndInput" min="1" step="1" value="3" />
          </div>
          <div class="help" style="margin-bottom:12px;">例：1章〜3章を指定すると、「物理 問題集 1章」〜「物理 問題集 3章」をまとめて作成します。</div>
        </div>

        <button class="btn primary" id="saveTemplateBtn" style="width:100%;">一覧に保存する</button>
        <div class="error" id="templateError"></div>
      </div>

      <div class="section-title">保存済みのやること一覧</div>
      <div id="templateList" class="list"></div>
    </div>
  </div>

  <div class="modal-backdrop" id="addFromTemplateModal">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="section-title" style="margin:0;">一覧から追加</div>
          <div class="muted" id="addTargetDateLabel"></div>
        </div>
        <button class="mini-btn" data-close="addFromTemplateModal">閉じる</button>
      </div>

      <div class="field">
        <label>追加するやること</label>
        <div id="addTemplateList" class="list"></div>
      </div>
      <div class="field">
        <label>締め切り日</label>
        <input type="date" id="addDeadlineInput" />
      </div>
      <div class="help">選択中の日付に追加されます。1日最大10件までです。</div>
      <div class="error" id="addTemplateError"></div>
    </div>
  </div>

  <div class="modal-backdrop" id="rewardModal">
    <div class="modal">
      <div class="modal-header">
        <div class="section-title" style="margin:0;">設定 / 報酬</div>
        <button class="mini-btn" data-close="rewardModal">閉じる</button>
      </div>

      <div class="stats-grid">
        <div class="stat-box">
          <div class="muted">累計追加ゲーム時間</div>
          <div class="stat-value" id="totalRewardTimeLabel">0分</div>
        </div>
        <div class="stat-box">
          <div class="muted">報酬獲得回数</div>
          <div class="stat-value" id="rewardCountLabel">0回</div>
        </div>
      </div>

      <div class="section-title">履歴</div>
      <div id="rewardHistoryList" class="list"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'todo-pwa-v2-data';
    const MAX_TASKS_PER_DAY = 10;
    const REWARD_MINUTES = 30;

    const state = loadState();
    let selectedDate = state.selectedDate || toISODate(new Date());
    let calendarCursor = new Date(selectedDate + 'T00:00:00');
    let splitMode = false;

    const els = {
      selectedDateLabel: document.getElementById('selectedDateLabel'),
      doneCountLabel: document.getElementById('doneCountLabel'),
      progressPercent: document.getElementById('progressPercent'),
      progressFill: document.getElementById('progressFill'),
      taskList: document.getElementById('taskList'),
      rewardBanner: document.getElementById('rewardBanner'),

      openCalendarBtn: document.getElementById('openCalendarBtn'),
      openTemplatesBtn: document.getElementById('openTemplatesBtn'),
      openAddFromTemplateBtn: document.getElementById('openAddFromTemplateBtn'),
      openRewardBtn: document.getElementById('openRewardBtn'),

      calendarModal: document.getElementById('calendarModal'),
      calendarMonthLabel: document.getElementById('calendarMonthLabel'),
      calendarGrid: document.getElementById('calendarGrid'),
      prevMonthBtn: document.getElementById('prevMonthBtn'),
      nextMonthBtn: document.getElementById('nextMonthBtn'),

      templatesModal: document.getElementById('templatesModal'),
      templateTitleInput: document.getElementById('templateTitleInput'),
      splitOffBtn: document.getElementById('splitOffBtn'),
      splitOnBtn: document.getElementById('splitOnBtn'),
      chapterFields: document.getElementById('chapterFields'),
      chapterStartInput: document.getElementById('chapterStartInput'),
      chapterEndInput: document.getElementById('chapterEndInput'),
      saveTemplateBtn: document.getElementById('saveTemplateBtn'),
      templateError: document.getElementById('templateError'),
      templateList: document.getElementById('templateList'),

      addFromTemplateModal: document.getElementById('addFromTemplateModal'),
      addTargetDateLabel: document.getElementById('addTargetDateLabel'),
      addTemplateList: document.getElementById('addTemplateList'),
      addDeadlineInput: document.getElementById('addDeadlineInput'),
      addTemplateError: document.getElementById('addTemplateError'),

      rewardModal: document.getElementById('rewardModal'),
      totalRewardTimeLabel: document.getElementById('totalRewardTimeLabel'),
      rewardCountLabel: document.getElementById('rewardCountLabel'),
      rewardHistoryList: document.getElementById('rewardHistoryList')
    };

    bindEvents();
    renderAll();
    registerSW();

    function bindEvents() {
      els.openCalendarBtn.addEventListener('click', () => openModal('calendarModal'));
      els.openTemplatesBtn.addEventListener('click', () => openModal('templatesModal'));
      els.openAddFromTemplateBtn.addEventListener('click', () => {
        els.addDeadlineInput.value = selectedDate;
        els.addTargetDateLabel.textContent = formatJPDate(selectedDate) + ' に追加';
        openModal('addFromTemplateModal');
      });
      els.openRewardBtn.addEventListener('click', () => openModal('rewardModal'));

      document.querySelectorAll('[data-close]').forEach(btn => {
        btn.addEventListener('click', () => closeModal(btn.dataset.close));
      });

      document.querySelectorAll('.modal-backdrop').forEach(backdrop => {
        backdrop.addEventListener('click', (e) => {
          if (e.target === backdrop) closeModal(backdrop.id);
        });
      });

      els.prevMonthBtn.addEventListener('click', () => {
        calendarCursor = new Date(calendarCursor.getFullYear(), calendarCursor.getMonth() - 1, 1);
        renderCalendar();
      });
      els.nextMonthBtn.addEventListener('click', () => {
        calendarCursor = new Date(calendarCursor.getFullYear(), calendarCursor.getMonth() + 1, 1);
        renderCalendar();
      });

      els.splitOffBtn.addEventListener('click', () => setSplitMode(false));
      els.splitOnBtn.addEventListener('click', () => setSplitMode(true));
      els.saveTemplateBtn.addEventListener('click', saveTemplate);
    }

    function setSplitMode(on) {
      splitMode = on;
      els.splitOnBtn.classList.toggle('active', on);
      els.splitOffBtn.classList.toggle('active', !on);
      els.chapterFields.style.display = on ? 'block' : 'none';
    }

    function renderAll() {
      state.selectedDate = selectedDate;
      persist();
      renderHome();
      renderCalendar();
      renderTemplates();
      renderAddFromTemplates();
      renderReward();
    }

    function renderHome() {
      els.selectedDateLabel.textContent = formatJPDate(selectedDate);
      const tasks = getTasksByDate(selectedDate);
      const completed = tasks.filter(t => t.completed).length;
      const percent = tasks.length ? Math.round((completed / tasks.length) * 100) : 0;
      els.doneCountLabel.textContent = `${completed} / ${tasks.length}`;
      els.progressPercent.textContent = `${percent}%`;
      els.progressFill.style.width = `${percent}%`;

      if (!tasks.length) {
        els.taskList.innerHTML = `<div class="empty">この日のやることはまだありません。<br>「＋ 一覧から追加」から入れられます。</div>`;
      } else {
        els.taskList.innerHTML = tasks.map(task => `
          <div class="task-item ${task.completed ? 'completed' : ''}">
            <input class="checkbox" type="checkbox" ${task.completed ? 'checked' : ''} data-task-check="${task.id}">
            <div>
              <div class="task-title">${escapeHtml(task.title)}</div>
              <div class="task-meta">締め切り：${formatJPDate(task.deadline)}</div>
            </div>
            <div class="action-col">
              <button class="mini-btn danger" data-task-delete="${task.id}">削除</button>
            </div>
          </div>
        `).join('');
      }

      els.taskList.querySelectorAll('[data-task-check]').forEach(input => {
        input.addEventListener('change', () => toggleTask(input.dataset.taskCheck, input.checked));
      });
      els.taskList.querySelectorAll('[data-task-delete]').forEach(btn => {
        btn.addEventListener('click', () => deleteTask(btn.dataset.taskDelete));
      });
    }

    function renderCalendar() {
      const year = calendarCursor.getFullYear();
      const month = calendarCursor.getMonth();
      els.calendarMonthLabel.textContent = `${year}年 ${month + 1}月`;

      const labels = ['日','月','火','水','木','金','土'];
      const first = new Date(year, month, 1);
      const startDay = first.getDay();
      const last = new Date(year, month + 1, 0).getDate();
      const today = toISODate(new Date());
      const taskDates = new Set(state.tasks.map(t => t.targetDate));

      let html = labels.map(d => `<div class="cal-label">${d}</div>`).join('');
      for (let i = 0; i < startDay; i++) html += `<div class="cal-day is-muted"></div>`;
      for (let day = 1; day <= last; day++) {
        const iso = toISODate(new Date(year, month, day));
        const classes = [ 'cal-day' ];
        if (iso === today) classes.push('is-today');
        if (iso === selectedDate) classes.push('is-selected');
        html += `
          <button class="${classes.join(' ')}" data-cal-date="${iso}">
            <div>${day}</div>
            ${taskDates.has(iso) ? '<div class="dot"></div>' : '<div style="height:6px"></div>'}
          </button>
        `;
      }
      els.calendarGrid.innerHTML = html;
      els.calendarGrid.querySelectorAll('[data-cal-date]').forEach(btn => {
        btn.addEventListener('click', () => {
          selectedDate = btn.dataset.calDate;
          calendarCursor = new Date(selectedDate + 'T00:00:00');
          closeModal('calendarModal');
          renderAll();
        });
      });
    }

    function renderTemplates() {
      if (!state.templates.length) {
        els.templateList.innerHTML = `<div class="empty">まだ一覧がありません。上のフォームから作成してください。</div>`;
        return;
      }
      els.templateList.innerHTML = state.templates.map(t => `
        <div class="template-item">
          <div style="width:22px;"></div>
          <div>
            <div class="template-title">${escapeHtml(t.title)}</div>
            <div class="template-meta">一覧から好きな日に追加できます</div>
          </div>
          <div class="action-col">
            <button class="mini-btn" data-template-add="${t.id}">この日に追加</button>
            <button class="mini-btn danger" data-template-delete="${t.id}">削除</button>
          </div>
        </div>
      `).join('');

      els.templateList.querySelectorAll('[data-template-delete]').forEach(btn => {
        btn.addEventListener('click', () => deleteTemplate(btn.dataset.templateDelete));
      });
      els.templateList.querySelectorAll('[data-template-add]').forEach(btn => {
        btn.addEventListener('click', () => {
          openModal('addFromTemplateModal');
          els.addDeadlineInput.value = selectedDate;
          els.addTargetDateLabel.textContent = formatJPDate(selectedDate) + ' に追加';
          selectTemplateInAddModal(btn.dataset.templateAdd);
        });
      });
    }

    function renderAddFromTemplates(selectedTemplateId = null) {
      els.addTemplateError.textContent = '';
      if (!state.templates.length) {
        els.addTemplateList.innerHTML = `<div class="empty">先に「やること作成」で一覧を作ってください。</div>`;
        return;
      }
      els.addTemplateList.innerHTML = state.templates.map(t => `
        <button class="seg-btn ${selectedTemplateId === t.id ? 'active' : ''}" style="text-align:left; width:100%;" data-add-template="${t.id}">${escapeHtml(t.title)}</button>
      `).join('');

      els.addTemplateList.querySelectorAll('[data-add-template]').forEach(btn => {
        btn.addEventListener('click', () => {
          const templateId = btn.dataset.addTemplate;
          addTemplateToDate(templateId, els.addDeadlineInput.value || selectedDate);
        });
      });
    }

    function selectTemplateInAddModal(templateId) {
      renderAddFromTemplates(templateId);
    }

    function renderReward() {
      const total = state.rewards.totalMinutes || 0;
      els.totalRewardTimeLabel.textContent = formatMinutes(total);
      els.rewardCountLabel.textContent = `${state.rewards.rewardCount || 0}回`;

      const history = [...(state.rewards.history || [])].sort((a, b) => b.date.localeCompare(a.date));
      if (!history.length) {
        els.rewardHistoryList.innerHTML = `<div class="empty">まだ報酬履歴はありません。</div>`;
        return;
      }
      els.rewardHistoryList.innerHTML = history.map(h => `
        <div class="template-item">
          <div style="width:22px;"></div>
          <div>
            <div class="template-title">${formatJPDate(h.date)}</div>
            <div class="template-meta">ゲーム時間 +${h.minutes}分</div>
          </div>
          <div></div>
        </div>
      `).join('');
    }

    function saveTemplate() {
      els.templateError.textContent = '';
      const title = els.templateTitleInput.value.trim();
      if (!title) {
        els.templateError.textContent = 'やること名を入力してください。';
        return;
      }

      if (!splitMode) {
        state.templates.push({ id: uid(), title });
      } else {
        const start = Number(els.chapterStartInput.value);
        const end = Number(els.chapterEndInput.value);
        if (!Number.isInteger(start) || !Number.isInteger(end) || start < 1 || end < 1) {
          els.templateError.textContent = '章番号は1以上の整数で入力してください。';
          return;
        }
        if (start > end) {
          els.templateError.textContent = '開始章は終了章以下にしてください。';
          return;
        }
        for (let i = start; i <= end; i++) {
          state.templates.push({ id: uid(), title: `${title} ${i}章` });
        }
      }

      els.templateTitleInput.value = '';
      els.chapterStartInput.value = '1';
      els.chapterEndInput.value = '3';
      persist();
      renderTemplates();
      renderAddFromTemplates();
    }

    function addTemplateToDate(templateId, deadline) {
      els.addTemplateError.textContent = '';
      const template = state.templates.find(t => t.id === templateId);
      if (!template) return;
      if (!deadline) {
        els.addTemplateError.textContent = '締め切り日を選んでください。';
        return;
      }
      const tasksForDay = getTasksByDate(selectedDate);
      if (tasksForDay.length >= MAX_TASKS_PER_DAY) {
        els.addTemplateError.textContent = '1日のやることは10件までです。';
        return;
      }
      state.tasks.push({
        id: uid(),
        title: template.title,
        targetDate: selectedDate,
        deadline,
        completed: false,
        createdAt: new Date().toISOString()
      });
      persist();
      renderAll();
      closeModal('addFromTemplateModal');
    }

    function toggleTask(taskId, checked) {
      const task = state.tasks.find(t => t.id === taskId);
      if (!task) return;
      task.completed = checked;
      persist();
      checkRewardForDate(task.targetDate);
      renderAll();
    }

    function deleteTask(taskId) {
      if (!confirm('このやることを削除しますか？')) return;
      state.tasks = state.tasks.filter(t => t.id !== taskId);
      persist();
      renderAll();
    }

    function deleteTemplate(templateId) {
      if (!confirm('この一覧項目を削除しますか？')) return;
      state.templates = state.templates.filter(t => t.id !== templateId);
      persist();
      renderTemplates();
      renderAddFromTemplates();
    }

    function checkRewardForDate(date) {
      const tasks = getTasksByDate(date);
      const allDone = tasks.length > 0 && tasks.every(t => t.completed);
      const grantedDates = state.rewards.grantedDates || [];
      if (allDone && !grantedDates.includes(date)) {
        state.rewards.totalMinutes = (state.rewards.totalMinutes || 0) + REWARD_MINUTES;
        state.rewards.rewardCount = (state.rewards.rewardCount || 0) + 1;
        state.rewards.grantedDates = [...grantedDates, date];
        state.rewards.history = [...(state.rewards.history || []), { date, minutes: REWARD_MINUTES }];
        persist();
        if (date === selectedDate) showRewardBanner();
      }
    }

    function showRewardBanner() {
      els.rewardBanner.style.display = 'block';
      clearTimeout(showRewardBanner.timer);
      showRewardBanner.timer = setTimeout(() => {
        els.rewardBanner.style.display = 'none';
      }, 2800);
    }

    function getTasksByDate(date) {
      return state.tasks
        .filter(t => t.targetDate === date)
        .sort((a, b) => a.createdAt.localeCompare(b.createdAt));
    }

    function openModal(id) {
      document.getElementById(id).classList.add('show');
      if (id === 'addFromTemplateModal') renderAddFromTemplates();
      if (id === 'rewardModal') renderReward();
      if (id === 'templatesModal') renderTemplates();
    }
    function closeModal(id) { document.getElementById(id).classList.remove('show'); }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadState() {
      try {
        const raw = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (raw) return normalizeState(raw);
      } catch (_) {}
      return normalizeState({});
    }

    function normalizeState(raw) {
      return {
        selectedDate: raw.selectedDate || toISODate(new Date()),
        templates: Array.isArray(raw.templates) ? raw.templates : [],
        tasks: Array.isArray(raw.tasks) ? raw.tasks : [],
        rewards: {
          totalMinutes: raw.rewards?.totalMinutes || 0,
          rewardCount: raw.rewards?.rewardCount || 0,
          grantedDates: Array.isArray(raw.rewards?.grantedDates) ? raw.rewards.grantedDates : [],
          history: Array.isArray(raw.rewards?.history) ? raw.rewards.history : []
        }
      };
    }

    function formatJPDate(iso) {
      const [y, m, d] = iso.split('-');
      return `${y}/${m}/${d}`;
    }

    function toISODate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function formatMinutes(total) {
      const h = Math.floor(total / 60);
      const m = total % 60;
      return h > 0 ? `${h}時間${m}分` : `${m}分`;
    }

    function uid() {
      return 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7);
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"]/g, s => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[s]));
    }

    async function registerSW() {
      if ('serviceWorker' in navigator) {
        try { await navigator.serviceWorker.register('./service-worker.js'); } catch (_) {}
      }
    }
  </script>
</body>
</html>
